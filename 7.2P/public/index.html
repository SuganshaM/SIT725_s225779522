<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Weather Station</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Live Weather Station</h1>
  <p class="subtitle">Real-time data updates via Socket.IO</p>

  <div class="last-updated">
    Last updated: <span id="time">--</span>
  </div>

  <div class="weather-grid">

    <div class="card">
      <div class="card-label">Condition</div>
      <div class="card-value" id="condition">--</div>
    </div>

    <div class="card">
      <div class="card-label">Temperature</div>
      <div class="card-value" id="temperature">--</div>
      <div class="card-unit">°C</div>
    </div>

    <div class="card">
      <div class="card-label">Humidity</div>
      <div class="card-value" id="humidity">--</div>
      <div class="card-unit">%</div>
    </div>

    <div class="card">
      <div class="card-label">Wind Speed</div>
      <div class="card-value" id="windSpeed">--</div>
      <div class="card-unit">km/h</div>
    </div>

    <div class="card">
      <div class="card-label">Pressure</div>
      <div class="card-value" id="pressure">--</div>
      <div class="card-unit">hPa</div>
    </div>

    <div class="card">
      <div class="card-label">UV Index</div>
      <div class="card-value" id="uvIndex">--</div>
    </div>

  </div>

  
  <script src="/socket.io/socket.io.js"></script>
  <script src="scripts.js"></script>

</body>
</html>
